services:
  retromonkey:
    build: .
    container_name: retromonkey
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///retromonkey.db
    volumes:
      - ./retromonkey.db:/app/retromonkey.db
      - ./retromonkey/static/images:/app/retromonkey/static/images
