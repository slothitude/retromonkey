<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px; min-height: 120px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #e0e0e0; padding: 16px;
    }
    h1 { font-size: 14px; color: #00ff88; margin-bottom: 8px; }
    h1 span { color: #888; font-size: 11px; font-weight: normal; }
    #status {
      font-size: 12px; color: #888; margin: 8px 0;
      min-height: 18px; word-break: break-all;
    }
    #results {
      font-size: 11px; color: #aaa; margin-top: 8px;
      max-height: 200px; overflow-y: auto; white-space: pre-wrap;
      font-family: 'Consolas', monospace; display: none;
    }
    button {
      background: #00ff88; color: #1a1a2e; border: none;
      padding: 10px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer; width: 100%; border-radius: 4px;
    }
    button:hover { background: #00cc6e; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    button.secondary {
      background: transparent; color: #00ff88;
      border: 1px solid #00ff88; margin-top: 6px;
    }
    button.secondary:hover { background: rgba(0,255,136,0.1); }
    .actions { margin-top: 10px; }
    .tag {
      display: inline-block; background: #2a2a4e; color: #00ff88;
      padding: 2px 8px; border-radius: 3px; font-size: 11px; margin: 2px;
    }
  </style>
</head>
<body>
  <h1>RetroMonkey Scraper <span>v1.0</span></h1>
  <div id="status">Navigate to AliExpress search, then click Scrape.</div>
  <button id="scrapeBtn">Scrape This Page</button>
  <div class="actions">
    <button id="copyBtn" class="secondary" style="display:none">Copy JSON to Clipboard</button>
    <button id="sendBtn" class="secondary" style="display:none">Send to RetroMonkey API</button>
  </div>
  <div id="results"></div>

  <script src="popup.js"></script>
</body>
</html>
