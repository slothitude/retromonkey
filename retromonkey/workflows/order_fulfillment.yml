name: order_fulfillment
description: >
  Full order fulfillment pipeline: reserve stock, send confirmation,
  create shipment, and notify the buyer.
trigger:
  event: order_received

actions:
  - type: reserve_stock
    product_id: "{{product_id}}"
    qty: "{{quantity}}"

  - type: send_email
    to: "{{buyer_email}}"
    subject: "Order Confirmed - #{{order_id}}"
    body: >
      Hi {{buyer_name}},

      Thank you for your order! We've received and confirmed your order #{{order_id}}.

      Your item{{plural}} will be shipped within 1-2 business days. You'll receive
      a tracking number by email once it's on the way.

      Best regards,
      RetroMonkey Team

  - type: update_order_status
    order_id: "{{order_id}}"
    status: "processing"

  - type: notify
    channel: dashboard
    level: info
    message: "Order #{{order_id}} received from {{buyer_name}} - stock reserved, confirmation sent."
